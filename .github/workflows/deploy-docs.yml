name: Deploy Documentation

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.ref }}

      - name: Install Flutter
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046 # v2.19.0
        with:
          flutter-version: '3.38.1'
          cache: true

      - name: Generate Markdown documentation
        run: |
          chmod +x ./.github/scripts/generate_docs_vitepress.sh
          ./.github/scripts/generate_docs_vitepress.sh

      - name: Upload markdown documentation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: markdown-docs
          path: md-docs/
          retention-days: 1

  update-md-doc:
    needs: generate-docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout md-doc branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: md-doc

      - name: Clean previous docs
        run: git rm -rf . 2>/dev/null || true

      - name: Download markdown documentation
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: markdown-docs
          path: md-docs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add md-docs
          if git diff --staged --quiet; then
            echo "No markdown changes to commit"
            exit 0
          fi

          git commit -m "Deploy to md-doc from @ ${{ github.repository }}@${{ github.sha }}."
          git push origin md-doc
